services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    restart: unless-stopped
    ipc: host
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-4B}
      --served-model-name qwen-local
      --port 8100
      --max-model-len 16392
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.95}
      --dtype auto
      --api-key ${VLLM_API_KEY:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_VISIBLE_DEVICES=${VLLM_GPU_DEVICES:-0}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - ${VLLM_GPU_DEVICES:-0}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      vllm:
        condition: service_healthy

volumes:
  hf-cache:
